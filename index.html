<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #ffffff;
            --error: #ff4444;
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .container { width: 100%; max-width: 400px; padding: 24px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 32px 32px;
            text-align: center;
        }
        .icon {
            width: 48px; height: 48px;
            background: var(--accent);
            border-radius: 12px;
            display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 20px; margin-bottom: 20px;
            color: var(--bg);
        }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; }
        .input-group { margin-bottom: 16px; }
        input {
            width: 100%; padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 16px; text-align: center;
            letter-spacing: 2px;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: #555; }
        input::placeholder { color: #444; letter-spacing: 0; }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-bottom: 12px;
        }
        .keypad button {
            padding: 14px; font-size: 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            font-family: inherit; font-weight: 500;
            user-select: none;
            -webkit-user-select: none;
        }
        .keypad button:active { background: #333; transform: scale(0.96); }
        .keypad button.action {
            background: var(--accent);
            color: var(--bg); border: none; font-weight: 600;
        }
        .keypad button.action:active { background: #ddd; }
        .alert {
            font-size: 13px; padding: 8px;
            border-radius: 8px; margin-top: 12px; display: none;
        }
        .alert.error { background: rgba(255,68,68,0.1); color: var(--error); display: block; }
        .alert.success { background: rgba(0,255,100,0.1); color: #00cc66; display: block; }
        .attempts { font-size: 12px; color: var(--text-dim); margin-top: 16px; min-height: 18px; }
        .attempts.warn { color: var(--error); }
        .shield {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(0,210,160,0.1);
            border-radius: 20px;
            font-size: 10px;
            color: #00d2a0;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">🔐</div>
            <span class="shield">🛡️ Seguridad Activa</span>
            <h1>Acceso Privado</h1>
            <p class="subtitle">Ingrese su codigo de seguridad</p>

            <div class="input-group">
                <input type="password" id="code" placeholder="••••••" maxlength="16" readonly>
            </div>

            <div class="keypad" id="keypad"></div>

            <div class="alert" id="alert"></div>
            <div class="attempts" id="attempts"></div>
        </div>
    </div>

    <script src="js/cripto.js"></script>
    <script src="js/auth.js"></script>
    <script>
        var CONFIG = {
            MAX_ATTEMPTS: 3,
            LOCKOUT_TIME: 300000,
            CODE_HASH: '37938b5f709794b49952ca757c95ffed5b9d72af61aa4093b98e8a30cd0f69ee1851e2ad3cf7e790d41e1c2053c8efaf9c8f5ad0d041d354dad818d5fbd6adcc'
        };

        var attempts = parseInt(localStorage.getItem('va_attempts') || '0');
        var lockout = parseInt(localStorage.getItem('va_lockout') || '0');

        buildKeypad();
        updateAttempts();

        if (Date.now() < lockout) { lockScreen(); }

        function buildKeypad() {
            var kp = document.getElementById('keypad'); kp.innerHTML = '';
            ['1','2','3','4','5','6','7','8','9'].forEach(function(d) {
                var b = document.createElement('button'); b.textContent = d;
                b.onclick = function() { add(d); }; kp.appendChild(b);
            });
            var clr = document.createElement('button'); clr.textContent = '⌫';
            clr.onclick = function() { document.getElementById('code').value = ''; };
            kp.appendChild(clr);
            var zero = document.createElement('button'); zero.textContent = '0';
            zero.onclick = function() { add('0'); }; kp.appendChild(zero);
            var go = document.createElement('button'); go.textContent = '→';
            go.className = 'action'; go.onclick = verify; kp.appendChild(go);
        }

        function add(d) {
            if (Date.now() < lockout) return;
            var inp = document.getElementById('code');
            if (inp.value.length < 16) inp.value += d;
        }

        async function verify() {
            if (Date.now() < lockout) return;
            var code = document.getElementById('code').value;
            if (code.length < 6) {
                showAlert('Codigo muy corto', 'error');
                return;
            }
            try {
                var hash = await CryptoManager.hashString(code, 1000);
                var ok = await CryptoManager.timingSafeCompare(hash, CONFIG.CODE_HASH);
                
                if (ok) {
                    // Registrar acceso exitoso
                    AuthManager.logAccess(true, 'Acceso con codigo maestro');
                    
                    // Verificar si hay actividad sospechosa
                    if (AuthManager.detectSuspicious()) {
                        showAlert('⚠️ Actividad sospechosa detectada. Se recomienda cambiar codigo.', 'error');
                        setTimeout(function() { grantAccess(); }, 2000);
                    } else {
                        showAlert('✅ Acceso concedido', 'success');
                        setTimeout(function() { grantAccess(); }, 400);
                    }
                } else {
                    // Registrar acceso fallido
                    AuthManager.logAccess(false, 'Codigo incorrecto');
                    
                    attempts++;
                    localStorage.setItem('va_attempts', attempts);
                    document.getElementById('code').value = '';
                    if (attempts >= CONFIG.MAX_ATTEMPTS) {
                        lockout = Date.now() + CONFIG.LOCKOUT_TIME;
                        localStorage.setItem('va_lockout', lockout);
                        lockScreen();
                    } else {
                        showAlert('Codigo incorrecto', 'error');
                    }
                    updateAttempts();
                }
            } catch (e) {
                showAlert('Error. Intente de nuevo.', 'error');
            }
        }

        function grantAccess() {
            sessionStorage.setItem('secure_session', CryptoManager.generateSessionToken());
            sessionStorage.setItem('session_expiry', Date.now() + 3600000);
            localStorage.removeItem('va_attempts');
            localStorage.removeItem('va_lockout');
            window.location.href = 'vault.html';
        }

        function lockScreen() {
            document.getElementById('keypad').style.opacity = '0.4';
            document.getElementById('keypad').style.pointerEvents = 'none';
            var remaining = Math.ceil((lockout - Date.now()) / 1000);
            showAlert('⛔ Bloqueado. Espere ' + remaining + 's', 'error');
            var timer = setInterval(function() {
                var r = Math.ceil((lockout - Date.now()) / 1000);
                if (r <= 0) {
                    clearInterval(timer);
                    document.getElementById('keypad').style.opacity = '1';
                    document.getElementById('keypad').style.pointerEvents = '';
                    document.getElementById('alert').style.display = 'none';
                    attempts = 0;
                    localStorage.removeItem('va_attempts');
                    localStorage.removeItem('va_lockout');
                    lockout = 0;
                    updateAttempts();
                } else {
                    showAlert('⛔ Bloqueado. Espere ' + r + 's', 'error');
                }
            }, 1000);
        }

        function showAlert(msg, type) {
            var a = document.getElementById('alert');
            a.textContent = msg;
            a.className = 'alert ' + type;
            if (type === 'success') setTimeout(function() { a.style.display = 'none'; }, 1500);
        }

        function updateAttempts() {
            var a = document.getElementById('attempts');
            if (attempts > 0) {
                a.textContent = 'Intentos: ' + attempts + '/' + CONFIG.MAX_ATTEMPTS;
                a.className = attempts >= 2 ? 'attempts warn' : 'attempts';
            } else {
                a.textContent = '';
                a.className = 'attempts';
            }
        }
    </script>
</body>
</html>
